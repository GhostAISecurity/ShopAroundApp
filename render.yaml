services:
  - type: web
    name: shoparound-nexus
    runtime: python
    repo: https://github.com/GhostAISecurity/ShopAroundApp
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn shoparound_professional:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/health
    autoDeploy: true
